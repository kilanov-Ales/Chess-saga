<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --gold-dim: #78350f;
            --red-exit: #ef4444;
        }
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
        }
        h1, h2, h3 { font-family: 'Cinzel', serif; }

        /* МЕНЮ (ИСПРАВЛЕН БАГ ОБРЕЗКИ) */
        #main-menu {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 2000;
            padding: 20px;
        }
        .scenario-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
            margin-top: 2rem;
        }
        .scenario-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .scenario-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .scenario-card.active { border-color: var(--gold); background: rgba(245, 158, 11, 0.1); }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        .app-container {
            display: none; 
            grid-template-columns: 650px 1fr; /* Широкая панель для большой доски */
            width: 100vw; height: 100vh;
        }
        .app-visible { display: grid !important; }

        .left-panel {
            background: #0f172a;
            border-right: 1px solid #334155;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* УПРАВЛЕНИЕ (ИСПРАВЛЕН НАЛЕЗ НА ДОСКУ) */
        .controls-group {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 1000;
        }
        .btn-exit-x { 
            width: 50px; height: 50px; 
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--red-exit); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--red-exit); cursor: pointer;
            font-size: 2rem; font-weight: bold;
            transition: all 0.3s;
        }
        .btn-exit-x:hover { background: var(--red-exit); color: white; transform: rotate(90deg); }

        .volume-box {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            background: rgba(15, 23, 42, 0.9); padding: 12px 8px;
            border-radius: 20px; border: 1px solid var(--gold);
        }
        .volume-slider { -webkit-appearance: slider-vertical; width: 10px; height: 80px; background: var(--gold-dim); cursor: pointer; }

        /* ВИЗУАЛИЗАЦИЯ */
        .theater-zone-mini { text-align: center; margin-bottom: 20px; width: 100%; height: 120px; }
        .visual-stage-mini img { width: 80px; height: 80px; margin: 0 auto; object-fit: contain; }

        /* ДОСКА (БОЛЬШАЯ НА НОУТЕ) */
        .chess-board-outer { 
            padding: 12px; background: #27272a; border-radius: 12px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .chess-board { 
            display: grid; 
            grid-template-columns: repeat(8, 70px); 
            grid-template-rows: repeat(8, 70px);
            width: 560px; height: 560px; 
        }
        .square { width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 60px; height: 60px; object-fit: contain; pointer-events: none; }
        
        .square.active-target { border: 3px solid var(--gold); cursor: pointer; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* ПРАВАЯ ПАНЕЛЬ */
        .right-panel { display: flex; flex-direction: column; padding: 1.5rem; gap: 1rem; background: var(--bg-dark); overflow: hidden; }
        .chronicle-card { background: #0f172a; border: 1px solid #334155; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .narrative-scroll { flex-grow: 1; overflow-y: auto; padding: 1rem; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ (ИСПРАВЛЕНЫ ВСЕ БАГИ) */
        @media (max-width: 1024px) {
            /* Меню в одну колонку */
            .scenario-selector { grid-template-columns: 1fr; max-height: 60vh; overflow-y: auto; padding: 10px; }
            
            .app-container { grid-template-columns: 1fr 1.2fr !important; }
            
            /* Доска выше и меньше */
            .left-panel { justify-content: flex-start !important; padding-top: 5px !important; }
            .theater-zone-mini { height: 70px !important; margin-bottom: 5px !important; }
            #scene-desc { display: none !important; } /* Убираем текст чтоб не прыгало */
            .visual-stage-mini img { width: 45px !important; height: 45px !important; }
            #scene-title { font-size: 0.8rem !important; }

            .chess-board { 
                grid-template-columns: repeat(8, 40px) !important; 
                grid-template-rows: repeat(8, 40px) !important;
                width: 320px !important; height: 320px !important; 
            }
            .square { width: 40px !important; height: 40px !important; }
            .piece-img { width: 34px !important; height: 34px !important; }
            
            .controls-group { top: 10px; left: 10px; scale: 0.7; transform-origin: top left; }
            .volume-box { display: none; } /* Убираем звук на мобилках для чистоты */
        }

        .flash-screen { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 5000; transition: opacity 0.4s; }
        .flash-active { opacity: 0.3; }
    </style>
</head>
<body onclick="resumeAudio()"> 
    <audio id="audio-bg" loop>
        <source src="Music_Background.mp3" type="audio/mpeg">
    </audio>
    <div id="flash" class="flash-screen"></div>

    <div id="main-menu">
        <h1 class="text-5xl text-amber-500 font-bold mb-2 tracking-tighter">CHESS SAGA</h1>
        <p class="text-slate-400 italic mb-4">Выберите главу истории</p>
        
        <div class="scenario-selector">
            <div class="scenario-card active" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold">✨ Свет Аргуса</h3>
            </div>
            <div class="scenario-card" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold">🚩 Знамя Света</h3>
            </div>
            <div class="scenario-card" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold">🌑 Судьба Тракслера</h3>
            </div>
        </div>
        <button class="mt-8 px-12 py-3 border-2 border-amber-500 text-amber-500 rounded-full font-bold hover:bg-amber-500 hover:text-slate-900 transition-all" onclick="startGame()">НАЧАТЬ</button>
    </div>

    <div class="app-container" id="main-app">
        <div class="left-panel">
            <div class="controls-group">
                <div class="btn-exit-x" onclick="exitToMenu()">×</div>
                <div class="volume-box">
                    <img src="Visualization/🔊.png" style="width:16px" alt="vol">
                    <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
                </div>
            </div>

            <div class="theater-zone-mini">
                <div id="visual-stage" class="visual-stage-mini">
                    <img src="Visualization/🏰.png" alt="scene">
                </div>
                <h1 id="scene-title" class="text-xl text-amber-500 font-bold uppercase mt-2">Приготовление</h1>
                <p id="scene-desc" class="text-slate-400 italic text-sm">Войска занимают позиции...</p>
            </div>

            <div class="chess-board-outer">
                <div id="board" class="chess-board"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-[10px] text-sky-400 uppercase tracking-widest mb-1 font-bold">Цели</h3>
                    <ul id="goals-list" class="text-[11px] space-y-1 text-slate-300"></ul>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-red-900/30">
                    <h3 class="text-[10px] text-red-500 uppercase tracking-widest mb-1 font-bold">Угрозы</h3>
                    <ul id="enemy-goals" class="text-[11px] space-y-1 text-slate-400"></ul>
                </div>
            </div>
            <div class="flex justify-between items-center text-xs font-mono text-amber-500 px-2">
                <span id="move-counter">ХОД: 1</span>
                <span id="player-turn">ОЧЕРЕДЬ: БЕЛЫЕ</span>
            </div>
            <div class="chronicle-card">
                <div class="bg-slate-800 p-2 border-b border-slate-700">
                    <h2 class="text-[10px] font-bold text-slate-300 uppercase">Летопись</h2>
                </div>
                <div class="narrative-scroll" id="narrative-box">
                    <div id="chronicle-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
