<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --gold-dim: #78350f;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow: hidden; /* Запрещаем случайный скролл всей страницы */
            height: 100vh;
            width: 100vw;
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #main-menu {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 9999; padding: 20px; overflow-y: auto;
        }
        .scenario-selector { display: grid; grid-template-columns: repeat(3, 280px); gap: 1rem; margin-top: 2rem; }
        @media (max-width: 900px) { .scenario-selector { grid-template-columns: 1fr; width: 90%; } }

        .scenario-card {
            background: rgba(15, 23, 42, 0.8); border: 1px solid #334155;
            padding: 1.25rem; border-radius: 1rem; cursor: pointer; transition: 0.3s;
        }
        .scenario-card.active { border-color: var(--gold); background: rgba(245, 158, 11, 0.1); }

        /* --- КОНТЕЙНЕР ПРИЛОЖЕНИЯ --- */
        #main-app {
            display: none;
            width: 100vw;
            height: 100vh;
            grid-template-columns: 1.2fr 0.8fr;
            background: var(--bg-dark);
        }
        .app-visible { display: grid !important; }

        /* ЛЕВАЯ ПАНЕЛЬ (ДОСКА И ВИЗУАЛ) */
        .left-panel {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0f172a; border-right: 1px solid #334155; position: relative; padding: 10px;
        }

        /* УМНЫЙ ПОЛЗУНОК (НЕ НАЛЕЗАЕТ) */
        .vol-game {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            background: rgba(15, 23, 42, 0.9); padding: 12px 8px; border-radius: 30px;
            border: 1px solid var(--gold); z-index: 50;
        }
        .volume-slider { -webkit-appearance: slider-vertical; width: 12px; height: 80px; cursor: pointer; }

        /* ТЕАТРАЛЬНАЯ ЗОНА */
        .theater-zone-mini { text-align: center; margin-bottom: 10px; }
        .theater-zone-mini img { width: 60px; margin: 0 auto; filter: drop-shadow(0 0 10px var(--gold)); }

        /* ДОСКА (АВТОМАТИЧЕСКИЙ РАЗМЕР) */
        .chess-board-outer { padding: 6px; background: #27272a; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chess-board { 
            display: grid; grid-template-columns: repeat(8, 1fr); 
            width: min(500px, 85vw, 70vh); 
            height: min(500px, 85vw, 70vh); 
        }
        .square { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 85%; height: 85%; object-fit: contain; }

        /* ПРАВАЯ ПАНЕЛЬ (ЗАДАЧИ И ХРОНИКА) */
        .right-panel { display: flex; flex-direction: column; padding: 15px; gap: 10px; overflow: hidden; background: #020617; }
        .chronicle-card { background: #0f172a; border: 1px solid #334155; border-radius: 12px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .narrative-scroll { flex: 1; overflow-y: auto; padding: 12px; font-size: 14px; }

        /* --- АДАПТИВ ПОД ТЕЛЕФОН (ВЕРТИКАЛЬНО) --- */
        @media (max-width: 1024px) and (orientation: portrait) {
            #main-app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; overflow-y: auto; }
            .left-panel { border-right: none; border-bottom: 1px solid #334155; padding-top: 60px; }
            .vol-game { top: 10px; left: 10px; flex-direction: row; height: auto; width: auto; padding: 6px 12px; }
            .volume-slider { -webkit-appearance: auto; width: 80px; height: 8px; }
            .right-panel { height: auto; min-height: 400px; padding-bottom: 40px; }
        }

        /* --- АДАПТИВ ПОД ТЕЛЕФОН (ГОРИЗОНТАЛЬНО) --- */
        @media (max-height: 500px) and (orientation: landscape) {
            .theater-zone-mini { display: none; } /* Прячем замок, чтобы доска влезла во всю высоту */
            .left-panel { padding: 5px; }
            .chess-board { width: 85vh !important; height: 85vh !important; }
            .right-panel { padding: 5px; gap: 5px; }
            .vol-game { scale: 0.7; top: 5px; left: 5px; }
        }

        .btn-battle { 
            border: 2px solid var(--gold); color: var(--gold); padding: 14px 60px; 
            border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-battle:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>
    <audio id="audio-bg" loop><source src="Music_Background.mp3" type="audio/mpeg"></audio>

    <div id="main-menu">
        <h1 class="text-6xl text-amber-500 font-bold mb-4 font-[Cinzel] text-center tracking-tighter">CHESS SAGA</h1>
        <div class="scenario-selector">
            <div class="scenario-card active" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold">✨ Свет Аргуса</h3>
                <p class="text-xs text-slate-400 mt-2 italic">История о великом самопожертвовании.</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold">🚩 Знамя Света</h3>
                <p class="text-xs text-slate-400 mt-2 italic">Битва Ордена против Клана Крови.</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold">🌑 Судьба Тракслера</h3>
                <p class="text-xs text-slate-400 mt-2 italic">Безумный гамбит и падение столицы.</p>
            </div>
        </div>
        <button id="start-btn" class="btn-battle mt-12">Начать битву</button>
    </div>

    <div id="main-app">
        <div class="left-panel">
            <div class="btn-exit" onclick="location.reload()" style="position:absolute; top:20px; right:20px; cursor:pointer; color:var(--gold); font-size:24px;">×</div>
            
            <div class="vol-game">
                <img src="Visualization/🔊.png" class="w-4">
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
            </div>

            <div class="theater-zone-mini">
                <img src="Visualization/🏰.png">
                <h2 id="scene-title" class="text-amber-500 font-bold uppercase text-lg mt-1">Затишье</h2>
                <p id="scene-desc" class="text-slate-400 text-[10px] italic">Армии ждут приказа...</p>
            </div>

            <div class="chess-board-outer">
                <div id="board" class="chess-board"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="grid grid-cols-2 gap-3 h-28">
                <div class="bg-slate-900/80 p-3 border border-slate-700 rounded-xl">
                    <p class="text-[9px] text-sky-400 font-bold uppercase tracking-widest mb-1">Задачи</p>
                    <ul id="goals-list" class="text-[10px] text-slate-300 leading-tight"></ul>
                </div>
                <div class="bg-slate-900/80 p-3 border border-red-900/30 rounded-xl">
                    <p class="text-[9px] text-red-500 font-bold uppercase tracking-widest mb-1">Враг</p>
                    <ul id="enemy-goals" class="text-[10px] text-slate-400 leading-tight"></ul>
                </div>
            </div>
            <div class="flex justify-between items-center px-1">
                <span id="move-counter" class="text-[10px] font-mono text-amber-500 uppercase">Ход: 1</span>
                <span id="player-turn" class="text-[10px] font-mono text-amber-500 uppercase">Белые</span>
            </div>
            <div class="chronicle-card">
                <div class="bg-slate-800 p-2 text-[10px] font-bold text-center border-b border-slate-700 uppercase tracking-widest">📜 Хроника</div>
                <div class="narrative-scroll" id="narrative-box">
                    <div id="chronicle-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
    <script>
        // ГАРАНТИРОВАННЫЙ ЗАПУСК ПОСЛЕ ЗАГРУЗКИ
        window.onload = function() {
            const startBtn = document.getElementById('start-btn');
            startBtn.addEventListener('click', function() {
                // Попытка войти в Fullscreen
                const doc = document.documentElement;
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

                // Смена экранов
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('main-app').classList.add('app-visible');

                // Старт логики
                if (window.startGame) {
                    startGame();
                }
            });
        };

        function updateVolume(val) {
            const audio = document.getElementById('audio-bg');
            if(audio) audio.volume = val;
        }
    </script>
</body>
</html>
