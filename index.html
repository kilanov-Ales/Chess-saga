<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --gold-dim: #78350f;
            --red-exit: #ef4444;
        }
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
        }
        h1, h2, h3 { font-family: 'Cinzel', serif; }

        /* МЕНЮ */
        #main-menu {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 2000;
            transition: all 0.8s ease;
        }
        .scenario-selector {
            display: grid;
            grid-template-columns: repeat(3, 280px);
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .scenario-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .scenario-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .scenario-card.active { border-color: var(--gold); background: rgba(245, 158, 11, 0.15); }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        .app-container {
            display: none; 
            grid-template-columns: 620px 1fr; /* Увеличенная панель для доски 520px */
            width: 100vw; height: 100vh;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .app-visible { display: grid !important; opacity: 1 !important; }

        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            border-right: 1px solid #334155;
            position: relative;
            padding: 20px;
        }

        /* УПРАВЛЕНИЕ: КРЕСТИК И ГРОМКОСТЬ СЛЕВА */
        .controls-group {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 500;
        }
        .btn-exit-x { 
            width: 54px; height: 54px; 
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--red-exit); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--red-exit); cursor: pointer;
            font-size: 2.2rem; font-weight: bold;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-exit-x:hover { 
            background: var(--red-exit); color: white; 
            transform: rotate(90deg) scale(1.1); 
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.5);
        }
        .volume-box {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            background: rgba(15, 23, 42, 0.9); padding: 12px 10px;
            border-radius: 25px; border: 1px solid var(--gold);
        }
        .volume-slider { -webkit-appearance: slider-vertical; width: 12px; height: 90px; background: var(--gold-dim); cursor: pointer; }

        /* ВИЗУАЛИЗАЦИЯ */
        .theater-zone-mini { text-align: center; margin-bottom: 25px; width: 100%; min-height: 120px; }
        .visual-stage-mini img { width: 90px; height: 90px; margin: 0 auto; object-fit: contain; filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.4)); }

        /* ДОСКА (ОГРОМНАЯ 520px) */
        .chess-board-outer { 
            padding: 12px; background: #27272a; border-radius: 12px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); 
        }
        .chess-board { 
            display: grid; 
            grid-template-columns: repeat(8, 65px); 
            grid-template-rows: repeat(8, 65px);
            width: 520px; height: 520px; 
        }
        .square { width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 56px; height: 56px; object-fit: contain; pointer-events: none; }
        
        .square.active-target { animation: target-pulse 1.5s infinite; cursor: pointer; border: 2px solid var(--gold); }
        @keyframes target-pulse {
            0%, 100% { background-color: rgba(245, 158, 11, 0.3); }
            50% { background-color: rgba(245, 158, 11, 0.7); }
        }

        /* ПРАВАЯ ПАНЕЛЬ */
        .right-panel { display: flex; flex-direction: column; padding: 1.5rem; gap: 1rem; background: var(--bg-dark); }
        .chronicle-card { background: #0f172a; border: 1px solid #334155; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .narrative-scroll { flex-grow: 1; overflow-y: auto; padding: 1.2rem; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr 1.15fr !important; }
            
            /* Фикс прыжков: только заголовок и картинка */
            #scene-desc { display: none !important; }
            .theater-zone-mini { height: 75px !important; min-height: 75px !important; margin-bottom: 5px !important; margin-top: -15px; }
            .visual-stage-mini img { width: 45px !important; height: 45px !important; }
            #scene-title { font-size: 0.8rem !important; }

            /* Доска закреплена и приподнята */
            .chess-board { 
                grid-template-columns: repeat(8, 42px) !important; 
                grid-template-rows: repeat(8, 42px) !important;
                width: 336px !important; height: 336px !important; 
            }
            .square { width: 42px !important; height: 42px !important; }
            .piece-img { width: 36px !important; height: 36px !important; }
            
            /* Крестик на мобилке */
            .controls-group { top: 10px; left: 10px; scale: 0.7; transform-origin: top left; }
            .volume-box { display: none; }
        }

        /* ЭФФЕКТЫ */
        .flash-screen { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 5000; transition: opacity 0.4s; }
        .flash-active { opacity: 0.3; }
        .shake-anim { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-5px, 5px); } 50% { transform: translate(5px, -5px); } }
    </style>
</head>
<body onclick="resumeAudio()"> 
    <audio id="audio-bg" loop>
        <source src="Music_Background.mp3" type="audio/mpeg">
    </audio>
    <div id="flash" class="flash-screen"></div>

    <div id="main-menu">
        <h1 class="text-6xl text-amber-500 font-bold mb-4 tracking-tighter">CHESS SAGA</h1>
        <div class="scenario-selector">
            <div class="scenario-card active" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold">✨ Свет Аргуса</h3>
                <p class="text-xs text-slate-400 mt-2">Миссия Экзодара.</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold">🚩 Знамя Света</h3>
                <p class="text-xs text-slate-400 mt-2">Орден Юстициария.</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold">🌑 Судьба Тракслера</h3>
                <p class="text-xs text-slate-400 mt-2">Безумный гамбит.</p>
            </div>
        </div>
        <button class="mt-12 px-16 py-4 border-2 border-amber-500 text-amber-500 rounded-full font-bold text-xl hover:bg-amber-500 hover:text-slate-900 transition-all tracking-widest" onclick="startGame()">В БОЙ</button>
    </div>

    <div class="app-container" id="main-app">
        <div class="left-panel">
            <div class="controls-group">
                <div class="btn-exit-x" onclick="exitToMenu()">×</div>
                <div class="volume-box">
                    <img src="Visualization/🔊.png" style="width:16px" alt="vol">
                    <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
                </div>
            </div>

            <div class="theater-zone-mini">
                <div id="visual-stage" class="visual-stage-mini">
                    <img src="Visualization/🏰.png" alt="scene">
                </div>
                <h1 id="scene-title" class="text-xl text-amber-500 font-bold uppercase mt-2">Начало Битвы</h1>
                <p id="scene-desc" class="text-slate-400 italic text-sm mt-1">Ожидание приказа...</p>
            </div>

            <div class="chess-board-outer">
                <div id="board" class="chess-board"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-[10px] text-sky-400 uppercase tracking-widest mb-2 font-bold">Цели Компании</h3>
                    <ul id="goals-list" class="text-[11px] space-y-2 text-slate-300"></ul>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-red-900/30">
                    <h3 class="text-[10px] text-red-500 uppercase tracking-widest mb-2 font-bold">Планы Врага</h3>
                    <ul id="enemy-goals" class="text-[11px] space-y-2 text-slate-400"></ul>
                </div>
            </div>
            <div class="flex justify-between items-center px-2 py-1 bg-slate-900/50 rounded border border-slate-800 text-xs font-mono text-amber-500 uppercase">
                <span id="move-counter">ЭТАП: 1</span>
                <span id="player-turn">ОЧЕРЕДЬ: БЕЛЫЕ</span>
            </div>
            <div class="chronicle-card">
                <div class="bg-slate-800 p-3"><h2 class="text-[10px] font-bold text-slate-200 uppercase">Хроника</h2></div>
                <div class="narrative-scroll" id="narrative-box">
                    <div id="chronicle-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
