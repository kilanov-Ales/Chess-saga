<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #020617; --gold: #f59e0b; --gold-dim: #78350f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Эффект вспышки при взятии фигуры (нужен для твоего кода) */
        #flash {
            position: fixed; inset: 0; background: white; opacity: 0;
            pointer-events: none; z-index: 9999; transition: opacity 0.3s;
        }
        .flash-active { opacity: 0.3 !important; }

        /* ГЛАВНОЕ МЕНЮ */
        #main-menu {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 2000; padding: 20px; transition: opacity 0.8s;
        }

        /* Контейнер приложения (подстроил под твой JS) */
        #main-app {
            display: none; 
            grid-template-columns: 1.2fr 0.8fr;
            width: 100%;
            height: 100%;
            max-width: 1400px; /* Чтобы на широких мониторах не расползалось */
            background: var(--bg-dark);
        }
        .app-visible { display: grid !important; }

        .left-panel {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0f172a; border-right: 1px solid #334155; position: relative; padding: 20px;
        }

        /* Тот самый ID menu-vol, который ищет твой JS */
        #menu-vol { position: absolute; bottom: 30px; right: 30px; z-index: 100; }

        /* Ползунок в игре */
        .vol-game {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: rgba(15, 23, 42, 0.8); padding: 15px 10px; border-radius: 30px;
            border: 1px solid var(--gold); z-index: 100;
        }
        .volume-slider { -webkit-appearance: slider-vertical; width: 12px; height: 100px; cursor: pointer; }

        /* ДОСКА (Авто-размер) */
        .chess-board-outer { padding: 8px; background: #27272a; border-radius: 8px; transition: transform 0.2s; }
        .chess-board { 
            display: grid; grid-template-columns: repeat(8, 1fr); 
            width: min(550px, 85vw, 65vh); height: min(550px, 85vw, 65vh); 
        }
        .square { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; position: relative; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }
        
        /* Анимация тряски для твоего кода */
        .shake-anim { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Активная клетка для хода */
        .active-target { cursor: pointer; animation: pulse 1.5s infinite; background-color: rgba(245, 158, 11, 0.4) !important; }
        @keyframes pulse { 0% { box-shadow: inset 0 0 0px var(--gold); } 50% { box-shadow: inset 0 0 20px var(--gold); } 100% { box-shadow: inset 0 0 0px var(--gold); } }

        /* ПРАВАЯ ПАНЕЛЬ */
        .right-panel { display: flex; flex-direction: column; padding: 20px; gap: 15px; overflow: hidden; }
        .chronicle-card { background: #0f172a; border: 1px solid #334155; border-radius: 12px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #narrative-box { flex: 1; overflow-y: auto; padding: 15px; }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 1024px) {
            #main-app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; overflow-y: auto; }
            .left-panel { padding-top: 70px; border-right: none; border-bottom: 1px solid #334155; }
            .vol-game { flex-direction: row; height: auto; top: 10px; left: 10px; }
            .volume-slider { -webkit-appearance: auto; width: 80px; height: 10px; }
        }
    </style>
</head>
<body onclick="resumeAudio()">
    <div id="flash"></div>
    <audio id="audio-bg" loop src="Music_Background.mp3"></audio>

    <div id="menu-vol" class="vol-game">
        <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
    </div>

    <div id="main-menu">
        <h1 class="text-6xl text-amber-500 font-bold mb-8 font-[Cinzel] tracking-tighter">CHESS SAGA</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full px-6">
            <div class="scenario-card active" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold text-xl">✨ Свет Аргуса</h3>
                <p class="text-sm text-slate-400 mt-2 italic">История о самопожертвовании.</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold text-xl">🚩 Знамя Света</h3>
                <p class="text-sm text-slate-400 mt-2 italic">Орден против Кланов.</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold text-xl">🌑 Судьба Тракслера</h3>
                <p class="text-sm text-slate-400 mt-2 italic">Безумный гамбит.</p>
            </div>
        </div>
        <button class="mt-12 px-16 py-4 border-2 border-amber-500 text-amber-500 rounded-full font-bold uppercase tracking-widest hover:bg-amber-500 hover:text-slate-900 transition-all" onclick="startGame()">Начать битву</button>
    </div>

    <div id="main-app">
        <div class="left-panel">
            <div class="absolute top-5 right-5 text-3xl cursor-pointer text-amber-500" onclick="exitToMenu()">×</div>
            
            <div class="vol-game">
                <img src="Visualization/🔊.png" class="w-4">
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
            </div>

            <div class="theater-zone-mini">
                <div id="visual-stage"></div>
                <h2 id="scene-title" class="text-amber-500 font-bold uppercase text-xl mt-2 tracking-widest"></h2>
                <p id="scene-desc" class="text-slate-400 italic text-sm mt-1"></p>
            </div>

            <div class="chess-board-outer">
                <div id="board" class="chess-board"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="grid grid-cols-2 gap-4 h-32">
                <div class="bg-slate-900/80 p-4 border border-slate-700 rounded-xl">
                    <h3 class="text-[10px] font-bold text-sky-400 mb-2 uppercase tracking-[0.2em]">ПЛАНЫ КОМПАНИИ</h3>
                    <ul id="goals-list" class="text-[11px] text-slate-300 space-y-1"></ul>
                </div>
                <div class="bg-slate-900/80 p-4 border border-red-900/30 rounded-xl">
                    <h3 class="text-[10px] font-bold text-red-500 mb-2 uppercase tracking-[0.2em]">ЗАДУМЫ СОПЕРНИКА</h3>
                    <ul id="enemy-goals" class="text-[11px] text-slate-400 space-y-1"></ul>
                </div>
            </div>
            
            <div class="flex justify-between items-center px-2 py-1">
                <span id="move-counter" class="text-xs font-mono text-amber-500 font-bold">ХОД: 1</span>
                <span id="player-turn" class="text-xs font-mono text-amber-500 font-bold uppercase">ОЧЕРЕДЬ: БЕЛЫЕ</span>
            </div>

            <div class="chronicle-card">
                <div class="bg-slate-800 p-2 text-[10px] font-bold text-center border-b border-slate-700 uppercase tracking-widest text-slate-400">📜 Хроника Событий</div>
                <div id="narrative-box">
                    <div id="chronicle-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
