<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --gold-dim: #78350f;
            --azure: #38bdf8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1, h2, h3 { font-family: 'Cinzel', serif; }

        /* --- ГЛАВНОЕ МЕНЮ (ПОЛНЫЙ ДИЗАЙН) --- */
        #main-menu {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 9999;
            padding: 20px;
            overflow-y: auto;
        }
        .scenario-selector {
            display: grid;
            grid-template-columns: repeat(3, 280px);
            gap: 1.5rem;
            margin-top: 2rem;
        }
        @media (max-width: 900px) {
            .scenario-selector { grid-template-columns: 1fr; width: 90%; }
        }
        .scenario-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .scenario-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .scenario-card.active { border-color: var(--gold); background: rgba(245, 158, 11, 0.05); }
        .menu-icon { width: 24px; height: 24px; display: inline-block; vertical-align: middle; margin-right: 8px; }

        /* --- ПРИЛОЖЕНИЕ (ПОЛНЫЙ ИНТЕРФЕЙС) --- */
        .app-container {
            display: none; 
            grid-template-columns: 650px 450px;
            width: 1100px;
            height: 850px;
            background: var(--bg-dark);
            position: relative;
        }
        .app-visible { display: grid !important; }

        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            border-right: 1px solid #334155;
            position: relative;
            padding: 1.5rem;
        }

        /* Ползунок звука */
        .vol-game {
            position: absolute; top: 100px; left: 1.5rem;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: rgba(15, 23, 42, 0.8); padding: 15px 10px; border-radius: 30px;
            border: 1px solid var(--gold); z-index: 100;
        }
        .volume-slider { -webkit-appearance: slider-vertical; width: 20px; height: 120px; cursor: pointer; }

        /* Театральная зона */
        .theater-zone-mini { text-align: center; margin-bottom: 1.5rem; width: 100%; }
        #visual-stage { display: flex; justify-content: center; margin-bottom: 0.5rem; }
        #visual-stage img { width: 70px; height: 70px; object-fit: contain; }

        /* Доска */
        .chess-board-outer { padding: 8px; background: #27272a; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .chess-board { 
            display: grid; grid-template-columns: repeat(8, 1fr); 
            width: 560px; height: 560px; 
        }
        .square { width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; position: relative; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }

        /* Правая панель */
        .right-panel { display: flex; flex-direction: column; padding: 2rem; gap: 1rem; background: var(--bg-dark); overflow: hidden; }
        .chronicle-card { background: #0f172a; border: 1px solid #334155; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .narrative-scroll { flex-grow: 1; overflow-y: auto; padding: 1rem; }

        /* --- АДАПТИВ ПОД ТЕЛЕФОНЫ (БЕЗ ПОТЕРИ ЭЛЕМЕНТОВ) --- */
        @media (max-width: 1150px) {
            .app-container { grid-template-columns: 1fr; width: 100vw; height: 100vh; overflow-y: auto; }
            .left-panel { border-right: none; border-bottom: 1px solid #334155; padding-top: 80px; }
            .chess-board { width: min(500px, 90vw); height: min(500px, 90vw); }
            .square { width: auto; height: auto; }
            .vol-game { top: 20px; left: 50%; transform: translateX(-50%); flex-direction: row; height: auto; padding: 8px 15px; }
            .volume-slider { -webkit-appearance: auto; width: 80px; height: 10px; }
        }

        @media (orientation: landscape) and (max-height: 550px) {
            .app-container { grid-template-columns: 1fr 1fr; overflow: hidden; }
            .theater-zone-mini img { width: 40px; height: 40px; }
            .chess-board { width: 70vh; height: 70vh; }
            .left-panel { padding: 10px; }
            .vol-game { scale: 0.7; left: 10px; transform: none; top: 10px; }
        }

        .btn-battle { border: 2px solid var(--gold); color: var(--gold); padding: 12px 50px; border-radius: 40px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <audio id="audio-bg" loop><source src="Music_Background.mp3" type="audio/mpeg"></audio>

    <div id="main-menu">
        <h1 class="text-6xl text-amber-500 font-bold mb-4">CHESS SAGA</h1>
        <div class="scenario-selector">
            <div class="scenario-card active" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold"><img src="Visualization/✨.png" class="menu-icon"> Свет Аргуса</h3>
                <p class="text-xs text-slate-400 mt-2">История о самопожертвовании.</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold"><img src="Visualization/🚩.png" class="menu-icon"> Знамя Света</h3>
                <p class="text-xs text-slate-400 mt-2">Орден против Клана.</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold"><img src="Visualization/🌑.png" class="menu-icon"> Судьба Тракслера</h3>
                <p class="text-xs text-slate-400 mt-2">Безумный гамбит.</p>
            </div>
        </div>
        <button id="start-btn" class="btn-battle mt-12">Начать битву</button>
    </div>

    <div class="app-container" id="main-app">
        <div class="left-panel">
            <div class="btn-exit" onclick="location.reload()" style="position:absolute; top:20px; right:20px; cursor:pointer; color:var(--gold); font-size:24px;">×</div>
            <div class="vol-game">
                <img src="Visualization/🔊.png" class="w-4">
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="document.getElementById('audio-bg').volume = this.value">
            </div>
            <div class="theater-zone-mini">
                <div id="visual-stage"><img src="Visualization/城堡.png"></div>
                <h1 id="scene-title" class="text-xl text-amber-500 font-bold uppercase mt-2">Затишье</h1>
                <p id="scene-desc" class="text-slate-400 italic text-sm">Армии ждут своего часа...</p>
            </div>
            <div class="chess-board-outer"><div id="board" class="chess-board"></div></div>
        </div>

        <div class="right-panel">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-[10px] font-bold text-sky-400 mb-2 uppercase tracking-widest">Задачи</h3>
                    <ul id="goals-list" class="text-[11px] space-y-2 text-slate-300"></ul>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-red-900/30">
                    <h3 class="text-[10px] font-bold text-red-500 mb-2 uppercase tracking-widest">Враг</h3>
                    <ul id="enemy-goals" class="text-[11px] space-y-2 text-slate-400"></ul>
                </div>
            </div>
            <div class="flex justify-between items-center px-2">
                <span id="move-counter" class="text-xs font-mono text-amber-500">ХОД: 1</span>
                <span id="player-turn" class="text-xs font-mono text-amber-500">ОЧЕРЕДЬ: БЕЛЫЕ</span>
            </div>
            <div class="chronicle-card">
                <div class="bg-slate-800 p-3"><h2 class="text-sm font-bold text-slate-200 uppercase">Хроника</h2></div>
                <div class="narrative-scroll" id="narrative-box"><div id="chronicle-list" class="space-y-4"></div></div>
            </div>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
    <script>
        window.onload = function() {
            document.getElementById('start-btn').addEventListener('click', function() {
                // Пытаемся включить Fullscreen
                const doc = document.documentElement;
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('main-app').classList.add('app-visible');

                // ФИКС СЕРОГО КВАДРАТА: ждем отрисовки и пинаем Resize
                setTimeout(() => {
                    window.dispatchEvent(new Event('resize'));
                    if (window.startGame) window.startGame();
                }, 200);
            });
        };
    </script>
</body>
</html>
