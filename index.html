<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --gold-dim: #78350f;
            --red-exit: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow: hidden; /* Фиксируем экран */
            display: flex;
            align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }
        h1, h2, h3 { font-family: 'Cinzel', serif; }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #main-menu {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 5000; padding: 20px; transition: opacity 0.8s ease;
            overflow-y: auto;
        }
        .scenario-selector { display: grid; grid-template-columns: repeat(3, 280px); gap: 1rem; }
        @media (max-width: 900px) { .scenario-selector { grid-template-columns: 1fr; width: 100%; max-width: 320px; } }

        .scenario-card {
            background: rgba(15, 23, 42, 0.8); border: 1px solid #334155;
            padding: 1.25rem; border-radius: 1.5rem; cursor: pointer; transition: 0.3s;
        }
        .scenario-card.active { border-color: var(--gold); background: rgba(245, 158, 11, 0.1); }
        .menu-icon { width: 24px; height: 24px; display: inline-block; vertical-align: middle; margin-right: 8px; }

        /* --- ИГРОВОЙ ИНТЕРФЕЙС --- */
        .app-container { display: none; grid-template-columns: 1.2fr 0.8fr; width: 100vw; height: 100vh; }
        .app-visible { display: grid !important; opacity: 1 !important; }

        .left-panel {
            background: #0f172a; border-right: 1px solid #334155;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; padding: 20px;
        }

        /* ЖЕСТКАЯ ФИКСАЦИЯ ЗОНЫ ВИЗУАЛИЗАЦИИ */
        .theater-zone-mini {
            height: 180px; width: 100%; max-width: 420px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; margin-bottom: 10px; flex-shrink: 0; /* Не сжиматься! */
        }
        .visual-stage-mini { height: 90px; display: flex; align-items: center; justify-content: center; }
        .visual-stage-mini img { width: 80px; height: 80px; object-fit: contain; filter: drop-shadow(0 0 15px var(--gold)); }

        /* ДОСКА */
        .chess-board-outer { padding: 10px; background: #27272a; border-radius: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .chess-board { 
            display: grid; grid-template-columns: repeat(8, 1fr); 
            width: min(480px, 85vw, 52vh); height: min(480px, 85vw, 52vh); 
        }
        .square { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; position: relative; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; z-index: 10; }

        /* ПОДСВЕТКА ХОДА */
        .square.active-target { cursor: pointer; position: relative; }
        .square.active-target::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(245, 158, 11, 0.4);
            animation: target-pulse 1.5s infinite; z-index: 5;
        }
        @keyframes target-pulse {
            0%, 100% { box-shadow: inset 0 0 0px var(--gold); }
            50% { box-shadow: inset 0 0 25px var(--gold); }
        }

        /* КНОПКА ВЫХОДА С АНИМАЦИЕЙ ПОВОРОТА */
        .btn-exit-x {
            position: absolute; top: 20px; left: 20px;
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid var(--gold); color: var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; cursor: pointer; z-index: 1000;
            transition: transform 0.4s ease, color 0.3s, border-color 0.3s, background-color 0.2s;
        }
        .btn-exit-x:hover { transform: rotate(90deg); color: var(--red-exit); border-color: var(--red-exit); }
        .btn-exit-x:active { background-color: var(--red-exit) !important; color: white !important; }

        /* ГРОМКОСТЬ */
        .volume-box {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: rgba(15, 23, 42, 0.8); padding: 15px 10px;
            border-radius: 2rem; border: 1px solid var(--gold); z-index: 100;
        }
        .volume-slider { -webkit-appearance: slider-vertical; width: 12px; height: 100px; cursor: pointer; }
        .vol-menu { position: absolute; bottom: 40px; right: 40px; }
        .vol-game { position: absolute; top: 100px; left: 1.5rem; }

        /* АДАПТИВ И ГОРИЗОНТАЛЬНЫЙ ВИД */
        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr; grid-template-rows: auto 1fr; overflow-y: auto; }
            .left-panel { min-height: 100vh; padding-top: 80px; border-right: none; }
            .vol-game { top: 20px; right: 20px; left: auto; flex-direction: row; height: auto; padding: 10px; }
            .volume-slider { -webkit-appearance: auto; width: 80px; height: 10px; }
            
            @media (orientation: landscape) {
                .app-container { grid-template-columns: 1.2fr 0.8fr; grid-template-rows: 1fr; overflow: hidden; }
                .left-panel { min-height: 100vh; padding-top: 10px; }
                .chess-board { width: 52vh; height: 52vh; }
                .theater-zone-mini { height: 140px; }
            }
        }

        .right-panel { display: flex; flex-direction: column; padding: 1.5rem; gap: 1rem; background: var(--bg-dark); overflow: hidden; }
        .chronicle-card { background: #0f172a; border: 1px solid #334155; border-radius: 1.5rem; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .narrative-scroll { flex: 1; overflow-y: auto; padding: 1rem; }
    </style>
</head>
<body onclick="resumeAudio()">

    <audio id="audio-bg" loop src="Music_Background.mp3"></audio>

    <div id="menu-vol" class="vol-menu volume-box">
        <img src="Visualization/🔊.png" class="w-5" alt="vol">
        <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
    </div>

    <div id="main-menu">
        <h1 class="text-6xl text-amber-500 font-bold mb-4 tracking-tighter text-center">CHESS SAGA</h1>
        <p class="text-slate-400 italic mb-8">Выберите главу истории</p>
        <div class="scenario-selector">
            <div id="card-argus" class="scenario-card active" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold mb-2"><img src="Visualization/✨.png" class="menu-icon"> Свет Аргуса</h3>
                <p class="text-xs text-slate-400">История о самопожертвовании.</p>
            </div>
            <div id="card-standard" class="scenario-card" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold mb-2"><img src="Visualization/🚩.png" class="menu-icon"> Знамя Света</h3>
                <p class="text-xs text-slate-400">Орден против Клана.</p>
            </div>
            <div id="card-traxler" class="scenario-card" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold mb-2"><img src="Visualization/🌑.png" class="menu-icon"> Судьба Тракслера</h3>
                <p class="text-xs text-slate-400">Безумный гамбит.</p>
            </div>
        </div>
        <button class="mt-12 px-16 py-4 border-2 border-amber-500 text-amber-500 rounded-full font-bold uppercase tracking-widest active:scale-95 transition-all" onclick="startGame()">Начать битву</button>
    </div>

    <div class="app-container" id="main-app">
        <div class="left-panel">
            <div class="btn-exit-x" onclick="exitToMenu()">×</div>
            
            <div class="vol-game volume-box">
                <img src="Visualization/🔊.png" class="w-5">
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
            </div>

            <div class="theater-zone-mini">
                <div id="visual-stage" class="visual-stage-mini"><img src="Visualization/城堡.png"></div>
                <h2 id="scene-title" class="text-amber-500 font-bold uppercase text-xl mt-1">Затишье</h2>
                <p id="scene-desc" class="text-slate-400 italic text-sm px-4">Сделайте первый ход...</p>
            </div>

            <div class="chess-board-outer">
                <div id="board" class="chess-board"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="grid grid-cols-2 gap-4 h-32">
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-[10px] font-bold text-sky-400 mb-2 uppercase tracking-widest">Планы компании</h3>
                    <ul id="goals-list" class="text-[11px] space-y-1 text-slate-300"></ul>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-red-900/30">
                    <h3 class="text-[10px] font-bold text-red-500 mb-2 uppercase tracking-widest">Задумы соперника</h3>
                    <ul id="enemy-goals" class="text-[11px] space-y-1 text-slate-400"></ul>
                </div>
            </div>
            <div class="flex justify-between items-center px-2">
                <span id="move-counter" class="text-xs font-mono text-amber-500 font-bold">ХОД: 1</span>
                <span id="player-turn" class="text-xs font-mono text-amber-500 font-bold uppercase">Очередь: Белые</span>
            </div>
            <div class="chronicle-card">
                <div class="bg-slate-800 p-2 text-xs font-bold text-center text-slate-300 uppercase">📜 Хроника Событий</div>
                <div class="narrative-scroll" id="narrative-box">
                    <div id="chronicle-list" class="space-y-4 text-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="flash" class="fixed inset-0 bg-white pointer-events-none opacity-0 z-[6000] transition-opacity duration-300"></div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
    <script>
        // Небольшой фикс для синхронизации выбора в JS и CSS
        const originalSelectScenario = window.selectScenario;
        window.selectScenario = function(key) {
            document.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-' + key).classList.add('active');
            selectedScenarioKey = key;
        };

        // Гарантированный рендер при старте
        const originalStart = window.startGame;
        window.startGame = function() {
            if(originalStart) originalStart();
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                renderBoard();
            }, 300);
        };
    </script>
</body>
</html>
