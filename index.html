<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --red-exit: #ff4444;
        }

        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- ГЛАВНОЕ МЕНЮ (Без громкости) --- */
        #main-menu {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        /* --- КНОПКА ВЫХОДА С АНИМАЦИЕЙ --- */
        .btn-exit-x {
            position: absolute; top: 20px; left: 20px;
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            color: var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.7);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s, border-color 0.3s, background-color 0.3s;
        }
        /* Вращение при наведении */
        .btn-exit-x:hover {
            transform: rotate(90deg);
            color: var(--red-exit);
            border-color: var(--red-exit);
        }
        /* Становится красной при нажатии */
        .btn-exit-x:active {
            background-color: var(--red-exit) !important;
            color: white !important;
            transform: scale(0.9) rotate(90deg);
        }

        /* --- ФИКСИРОВАННАЯ ВИЗУАЛИЗАЦИЯ --- */
        .theater-zone-mini {
            width: 100%;
            height: 180px; /* Жестко фиксируем высоту */
            flex-shrink: 0; /* Запрещаем сжиматься */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 15px;
            pointer-events: none;
        }
        .visual-stage-mini {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .visual-stage-mini img {
            max-height: 80px;
            width: auto;
            filter: drop-shadow(0 0 15px var(--gold));
        }

        /* --- ИГРОВОЙ КОНТЕЙНЕР --- */
        .app-container {
            display: none;
            grid-template-columns: 1.1fr 0.9fr;
            width: 100vw;
            height: 100vh;
        }
        .app-visible { display: grid !important; }

        .left-panel {
            background: #0f172a;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-right: 1px solid #334155;
        }

        .chess-board-outer {
            padding: 10px;
            background: #27272a;
            border-radius: 2rem; /* Закругленные края */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: min(500px, 85vw, 50vh);
            height: min(500px, 85vw, 50vh);
        }

        /* --- ПОДВЕТКА ХОДА --- */
        .square.active-target {
            position: relative;
            cursor: pointer;
        }
        .square.active-target::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 158, 11, 0.4);
            animation: pulse-gold 1.5s infinite;
            z-index: 5;
        }
        @keyframes pulse-gold {
            0% { box-shadow: inset 0 0 0px var(--gold); }
            50% { box-shadow: inset 0 0 20px var(--gold); }
            100% { box-shadow: inset 0 0 0px var(--gold); }
        }

        /* --- ГРОМКОСТЬ В ИГРЕ --- */
        .vol-game {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(15, 23, 42, 0.9);
            padding: 20px 10px;
            border-radius: 3rem;
            border: 1px solid var(--gold);
            z-index: 100;
        }
        .volume-slider {
            -webkit-appearance: slider-vertical;
            width: 8px;
            height: 120px;
            cursor: pointer;
        }

        /* --- АДАПТИВ И ГОРИЗОНТАЛЬНЫЙ ВИД --- */
        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; overflow-y: auto; }
            .left-panel { height: 100vh; border-right: none; border-bottom: 1px solid #334155; }
            .vol-game { top: 20px; right: 20px; left: auto; bottom: auto; flex-direction: row; height: auto; padding: 10px 15px; }
            .volume-slider { -webkit-appearance: auto; width: 80px; height: 10px; }

            /* ФИКС ГОРИЗОНТАЛИ */
            @media (orientation: landscape) {
                .app-container { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
                .left-panel { height: 100vh; }
                .chess-board { width: 45vh; height: 45vh; }
                .theater-zone-mini { height: 140px; }
            }
        }

        .right-panel { display: flex; flex-direction: column; padding: 1.5rem; gap: 1rem; background: #020617; }
        .info-card { background: #0f172a; border-radius: 1.5rem; border: 1px solid #334155; padding: 15px; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 90%; height: 90%; object-fit: contain; z-index: 10; pointer-events: none; }
    </style>
</head>
<body onclick="if(window.resumeAudio) resumeAudio()">

    <div id="main-menu">
        <h1 class="text-6xl text-amber-500 font-bold mb-10 font-[Cinzel]">CHESS SAGA</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl px-6">
            <div class="scenario-card border-2 border-slate-700 p-6 rounded-[2rem] cursor-pointer hover:border-amber-500 transition-all" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold text-xl mb-2">✨ Свет Аргуса</h3>
                <p class="text-sm text-slate-400">Великая жертва ради будущего.</p>
            </div>
            </div>
        <button class="mt-12 px-16 py-4 bg-amber-500 text-slate-900 rounded-full font-bold uppercase tracking-widest hover:scale-105 transition-all" onclick="startGame()">Начать битву</button>
    </div>

    <div class="app-container" id="main-app">
        <div class="left-panel">
            <div class="btn-exit-x" onclick="exitToMenu()">×</div>
            
            <div class="vol-game">
                <img src="Visualization/🔊.png" class="w-5">
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
            </div>

            <div class="theater-zone-mini">
                <div id="visual-stage" class="visual-stage-mini">
                    <img src="Visualization/城堡.png">
                </div>
                <h2 id="scene-title" class="text-amber-500 font-bold uppercase text-2xl font-[Cinzel] mt-2">Затишье</h2>
                <p id="scene-desc" class="text-slate-400 italic text-sm mt-1 px-10">Армии замерли в ожидании приказа...</p>
            </div>

            <div class="chess-board-outer">
                <div id="board" class="chess-board"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="grid grid-cols-2 gap-4">
                <div class="info-card">
                    <h3 class="text-sky-400 text-xs font-bold uppercase mb-2">Планы компании</h3>
                    <ul id="goals-list" class="text-xs space-y-1 text-slate-300"></ul>
                </div>
                <div class="info-card">
                    <h3 class="text-red-500 text-xs font-bold uppercase mb-2">Задумы соперника</h3>
                    <ul id="enemy-goals" class="text-xs space-y-1 text-slate-400"></ul>
                </div>
            </div>
            <div class="flex-1 info-card flex flex-col overflow-hidden">
                <div class="text-center text-slate-500 text-[10px] uppercase tracking-widest mb-2">Хроника битвы</div>
                <div id="narrative-box" class="flex-1 overflow-y-auto pr-2">
                    <div id="chronicle-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
    <script>
        function updateVolume(val) {
            const audio = document.getElementById('audio-bg');
            if(audio) audio.volume = val;
        }
        
        // Гарантируем запуск
        const originalStart = window.startGame;
        window.startGame = function() {
            if(originalStart) originalStart();
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                if(window.renderBoard) window.renderBoard();
            }, 250);
        };
    </script>
</body>
</html>
