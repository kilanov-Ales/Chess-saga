<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --gold-dim: #78350f;
        }
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }

        /* ГЛАВНОЕ МЕНЮ */
        #main-menu {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 9999;
            padding: 20px;
            visibility: visible;
        }

        /* КОНТЕЙНЕР ИГРЫ */
        #main-app {
            display: none; /* Скрыто до нажатия кнопки */
            grid-template-columns: 1.2fr 0.8fr;
            width: 100vw;
            height: 100vh;
            background: var(--bg-dark);
        }

        /* Если экран маленький (телефон) */
        @media (max-width: 1024px) {
            #main-app {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                overflow-y: auto;
            }
            .chess-board { 
                width: min(450px, 90vw) !important; 
                height: min(450px, 90vw) !important; 
            }
        }

        .scenario-selector {
            display: grid;
            grid-template-columns: repeat(3, 280px);
            gap: 1rem;
            margin-top: 2rem;
        }
        @media (max-width: 900px) { .scenario-selector { grid-template-columns: 1fr; } }

        .scenario-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            padding: 1.25rem;
            border-radius: 1rem;
            cursor: pointer;
        }
        .scenario-card.active { border-color: var(--gold); background: rgba(245, 158, 11, 0.1); }

        .chess-board { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            width: 560px; 
            height: 560px; 
            background: #27272a;
            padding: 8px;
            border-radius: 8px;
        }
        .square { display: flex; align-items: center; justify-content: center; aspect-ratio: 1; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }

        .btn-battle {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px 50px;
            border-radius: 99px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }
    </style>
</head>
<body onclick="if(window.resumeAudio) resumeAudio()">

    <div id="main-menu">
        <h1 class="text-6xl text-amber-500 font-bold mb-4 font-[Cinzel] text-center">CHESS SAGA</h1>
        <div class="scenario-selector">
            <div class="scenario-card active" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold">✨ Свет Аргуса</h3>
                <p class="text-xs text-slate-400 mt-2">О самопожертвовании.</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold">🚩 Знамя Света</h3>
                <p class="text-xs text-slate-400 mt-2">Орден против Клана.</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold">🌑 Судьба Тракслера</h3>
                <p class="text-xs text-slate-400 mt-2">Безумный гамбит.</p>
            </div>
        </div>

        <button class="btn-battle mt-10 uppercase tracking-widest" 
                onclick="
                    document.getElementById('main-menu').style.display = 'none';
                    document.getElementById('main-app').style.display = 'grid';
                    if(window.startGame) startGame();
                ">
            Начать битву
        </button>
    </div>

    <div id="main-app">
        <div class="flex flex-col items-center justify-center bg-[#0f172a] border-r border-slate-700 p-4">
            <div class="text-center mb-6">
                <img src="Visualization/🏰.png" class="w-16 mx-auto mb-2">
                <h2 id="scene-title" class="text-amber-500 font-bold uppercase text-xl">Затишье</h2>
            </div>
            <div id="board" class="chess-board"></div>
        </div>

        <div class="flex flex-col p-6 gap-4 overflow-hidden">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/80 p-4 border border-slate-700 rounded-xl">
                    <p class="text-[10px] text-sky-400 font-bold mb-2">ЗАДАЧИ</p>
                    <ul id="goals-list" class="text-[11px] text-slate-300"></ul>
                </div>
                <div class="bg-slate-900/80 p-4 border border-red-900/30 rounded-xl">
                    <p class="text-[10px] text-red-500 font-bold mb-2">ВРАГ</p>
                    <ul id="enemy-goals" class="text-[11px] text-slate-400"></ul>
                </div>
            </div>
            <div class="flex-1 flex flex-col bg-slate-900 border border-slate-700 rounded-xl overflow-hidden">
                <div class="bg-slate-800 p-2 text-xs font-bold text-center">📜 ХРОНИКА</div>
                <div id="narrative-box" class="p-4 overflow-y-auto">
                    <div id="chronicle-list" class="space-y-4 text-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
