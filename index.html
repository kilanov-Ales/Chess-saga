<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --gold-dim: #78350f;
            --red-exit: #ef4444;
        }
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1, h2, h3 { font-family: 'Cinzel', serif; }

        /* МЕНЮ */
        #main-menu {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 2000;
        }
        .scenario-selector {
            display: grid;
            grid-template-columns: repeat(3, 280px);
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .scenario-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .scenario-card.active { border-color: var(--gold); background: rgba(245, 158, 11, 0.1); }

        /* ИГРА */
        .app-container {
            display: none; 
            grid-template-columns: 750px 1fr; /* Увеличено до 750px, чтобы сдвинуть доску вправо */
            width: 100vw; height: 100vh;
        }
        .app-visible { display: grid !important; }

        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Сдвигаем содержимое (доску и театр) вправо */
            justify-content: center;
            background: #0f172a;
            border-right: 1px solid #334155;
            position: relative;
            padding-right: 60px; /* Отступ от правой границы панели для центровки */
        }

        /* КРЕСТИК И ПОЛЗУНОК (ОСТАЛИСЬ СЛЕВА) */
        .controls-group {
            position: absolute;
            top: 25px;
            left: 25px; /* Зафиксированы слева сверху */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 1000;
        }
        .btn-exit-x { 
            width: 50px; height: 50px; 
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--red-exit); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--red-exit); cursor: pointer;
            font-size: 2rem; font-weight: bold;
        }
        .volume-box {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            background: rgba(15, 23, 42, 0.9); padding: 12px 8px;
            border-radius: 20px; border: 1px solid var(--gold);
        }
        .volume-slider { -webkit-appearance: slider-vertical; width: 10px; height: 80px; }

        /* ТЕАТР / ВИЗУАЛИЗАЦИЯ */
        .theater-zone-mini { text-align: center; margin-bottom: 20px; width: 560px; }
        .visual-stage-mini img { width: 85px; height: 85px; margin: 0 auto; object-fit: contain; }

        /* ДОСКА (560px) */
        .chess-board-outer { 
            padding: 10px; background: #27272a; border-radius: 12px;
        }
        .chess-board { 
            display: grid; 
            grid-template-columns: repeat(8, 70px); 
            grid-template-rows: repeat(8, 70px);
            width: 560px; height: 560px; 
        }
        .square { width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 60px; height: 60px; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr 1.2fr !important; }
            .left-panel { 
                align-items: center !important; 
                justify-content: flex-start !important; 
                padding-right: 0 !important; 
                padding-top: 10px !important; 
            }
            .theater-zone-mini { width: 100% !important; height: 70px !important; margin-bottom: 5px !important; }
            #scene-desc { display: none !important; }
            .visual-stage-mini img { width: 40px !important; height: 40px !important; }

            /* Доска меньше и выше */
            .chess-board { 
                grid-template-columns: repeat(8, 35px) !important; 
                grid-template-rows: repeat(8, 35px) !important;
                width: 280px !important; height: 280px !important; 
            }
            .square { width: 35px !important; height: 35px !important; }
            .piece-img { width: 30px !important; height: 30px !important; }

            .controls-group { left: 10px !important; top: 10px !important; scale: 0.7; }
            .volume-box { display: none; }
        }

        .flash-screen { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 5000; transition: opacity 0.4s; }
        .flash-active { opacity: 0.3; }
    </style>
</head>
<body onclick="resumeAudio()">
    <audio id="audio-bg" loop><source src="Music_Background.mp3" type="audio/mpeg"></audio>
    <div id="flash" class="flash-screen"></div>

    <div id="main-menu">
        <h1 class="text-5xl text-amber-500 font-bold mb-4">CHESS SAGA</h1>
        <div class="scenario-selector">
            <div class="scenario-card active" onclick="selectScenario('argus')"><h3>✨ Свет Аргуса</h3></div>
            <div class="scenario-card" onclick="selectScenario('standard')"><h3>🚩 Знамя Света</h3></div>
            <div class="scenario-card" onclick="selectScenario('traxler')"><h3>🌑 Судьба Тракслера</h3></div>
        </div>
        <button class="mt-8 px-12 py-3 border-2 border-amber-500 text-amber-500 rounded-full font-bold" onclick="startGame()">В БОЙ</button>
    </div>

    <div class="app-container" id="main-app">
        <div class="left-panel">
            <div class="controls-group">
                <div class="btn-exit-x" onclick="exitToMenu()">×</div>
                <div class="volume-box">
                    <img src="Visualization/🔊.png" style="width:16px">
                    <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
                </div>
            </div>
            <div class="theater-zone-mini">
                <div id="visual-stage" class="visual-stage-mini"><img src="Visualization/🏰.png"></div>
                <h1 id="scene-title" class="text-lg text-amber-500 font-bold uppercase mt-1">Подготовка</h1>
                <p id="scene-desc" class="text-slate-400 italic text-xs">Войска ждут...</p>
            </div>
            <div class="chess-board-outer"><div id="board" class="chess-board"></div></div>
        </div>
        <div class="right-panel">
            <div class="grid grid-cols-2 gap-4 p-4">
                <div class="bg-slate-900 p-3 rounded border border-slate-700">
                    <h3 class="text-[10px] text-sky-400 uppercase font-bold mb-1">Задачи</h3>
                    <ul id="goals-list" class="text-[11px] text-slate-300"></ul>
                </div>
                <div class="bg-slate-900 p-3 rounded border border-red-900/30">
                    <h3 class="text-[10px] text-red-500 uppercase font-bold mb-1">Враг</h3>
                    <ul id="enemy-goals" class="text-[11px] text-slate-400"></ul>
                </div>
            </div>
            <div class="chronicle-card mx-4 mb-4">
                <div class="narrative-scroll" id="narrative-box"><div id="chronicle-list" class="space-y-3"></div></div>
            </div>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
