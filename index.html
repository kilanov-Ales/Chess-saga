<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --gold-dim: #78350f;
            --red-exit: #ef4444;
        }
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1, h2, h3 { font-family: 'Cinzel', serif; }

        /* --- КНОПКА ВЫХОДА (АНИМАЦИЯ) --- */
        .btn-exit-x {
            position: absolute; top: 1.5rem; left: 1.5rem;
            width: 45px; height: 45px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold);
            cursor: pointer; z-index: 1000;
            font-size: 1.8rem;
            transition: transform 0.4s ease, color 0.3s, border-color 0.3s, background-color 0.2s;
        }
        .btn-exit-x:hover {
            transform: rotate(90deg);
            color: var(--red-exit);
            border-color: var(--red-exit);
        }
        .btn-exit-x:active {
            background-color: var(--red-exit) !important;
            color: white !important;
            transform: scale(0.95) rotate(90deg);
        }

        /* --- ФИКСАЦИЯ ВЕРХНЕЙ ЗОНЫ (ЧТОБЫ НЕ ПРЫГАЛО) --- */
        .theater-zone-mini { 
            height: 160px !important; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            margin-bottom: 1rem;
            flex-shrink: 0;
        }
        .visual-stage-mini { height: 80px; display: flex; align-items: center; justify-content: center; }
        .visual-stage-mini img { width: 75px; height: 75px; object-fit: contain; filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.4)); }

        /* --- ПОДСВЕТКА ХОДА --- */
        .square.active-target { cursor: pointer !important; position: relative; }
        .square.active-target::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 158, 11, 0.4);
            border: 2px solid var(--gold);
            animation: target-glow 1s infinite alternate;
            z-index: 5;
        }
        @keyframes target-glow {
            from { opacity: 0.4; box-shadow: inset 0 0 5px var(--gold); }
            to { opacity: 0.8; box-shadow: inset 0 0 25px var(--gold); }
        }

        /* --- ИНТЕРФЕЙС --- */
        #main-menu {
            position: fixed; inset: 0; z-index: 2000;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .app-container { display: none; grid-template-columns: 1.2fr 0.8fr; width: 100vw; height: 100vh; }
        .app-visible { display: grid !important; opacity: 1 !important; }

        .left-panel { background: #0f172a; border-right: 1px solid #334155; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .chess-board-outer { padding: 8px; background: #27272a; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .chess-board { display: grid; grid-template-columns: repeat(8, 1fr); width: min(480px, 85vw, 55vh); height: min(480px, 85vw, 55vh); }
        .square { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; z-index: 10; }

        .right-panel { display: flex; flex-direction: column; padding: 2rem; gap: 1rem; background: #020617; overflow: hidden; }
        .chronicle-card { background: #0f172a; border: 1px solid #334155; border-radius: 16px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .narrative-scroll { flex: 1; overflow-y: auto; padding: 1rem; }

        .volume-box { display: flex; flex-direction: column; align-items: center; gap: 10px; background: rgba(15, 23, 42, 0.8); padding: 15px 10px; border-radius: 30px; border: 1px solid var(--gold); }
        .vol-game { position: absolute; top: 100px; left: 1.5rem; }
        .volume-slider { -webkit-appearance: slider-vertical; width: 15px; height: 100px; cursor: pointer; }

        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr; grid-template-rows: auto 1fr; overflow-y: auto; }
            .left-panel { padding-top: 80px; padding-bottom: 20px; }
            .vol-game { top: 20px; right: 20px; left: auto; flex-direction: row; height: auto; }
            .volume-slider { -webkit-appearance: auto; height: 10px; width: 80px; }
        }
    </style>
</head>
<body onclick="resumeAudio()"> 

    <audio id="audio-bg" loop src="Music_Background.mp3"></audio>

    <div id="main-menu">
        <h1 class="text-6xl text-amber-500 font-bold mb-8 tracking-tighter text-center">CHESS SAGA</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 px-4">
            <div id="card-argus" class="scenario-card p-6 border border-slate-700 rounded-2xl active cursor-pointer" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold mb-2">✨ Свет Аргуса</h3>
                <p class="text-xs text-slate-400">История о самопожертвовании.</p>
            </div>
            <div id="card-standard" class="scenario-card p-6 border border-slate-700 rounded-2xl cursor-pointer" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold mb-2">🚩 Знамя Света</h3>
                <p class="text-xs text-slate-400">Орден против Клана.</p>
            </div>
            <div id="card-traxler" class="scenario-card p-6 border border-slate-700 rounded-2xl cursor-pointer" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold mb-2">🌑 Судьба Тракслера</h3>
                <p class="text-xs text-slate-400">Безумный гамбит.</p>
            </div>
        </div>
        <button class="px-12 py-3 border-2 border-amber-500 text-amber-500 rounded-full hover:bg-amber-500 hover:text-slate-900 transition-all font-bold tracking-widest uppercase" onclick="startGame()">Начать битву</button>
    </div>

    <div id="main-app" class="app-container">
        <div class="left-panel">
            <div class="btn-exit-x" onclick="exitToMenu()">×</div>
            
            <div class="vol-game volume-box">
                <img src="Visualization/🔊.png" class="w-5">
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
            </div>

            <div class="theater-zone-mini">
                <div id="visual-stage" class="visual-stage-mini"><img src="Visualization/🛡️.png"></div>
                <h2 id="scene-title" class="text-xl text-amber-500 font-bold uppercase mt-2">Затишье</h2>
                <p id="scene-desc" class="text-slate-400 italic text-sm px-6">Сделайте первый ход...</p>
            </div>

            <div class="chess-board-outer"><div id="board" class="chess-board"></div></div>
        </div>

        <div class="right-panel">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-[10px] font-bold text-sky-400 mb-2 uppercase">Задачи</h3>
                    <ul id="goals-list" class="text-[11px] space-y-2 text-slate-300"></ul>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-red-900/30">
                    <h3 class="text-[10px] font-bold text-red-500 mb-2 uppercase">Враг</h3>
                    <ul id="enemy-goals" class="text-[11px] space-y-2 text-slate-400"></ul>
                </div>
            </div>
            <div class="flex justify-between items-center px-2 font-mono text-xs text-amber-500">
                <span id="move-counter">ХОД: 1</span>
                <span id="player-turn">ОЧЕРЕДЬ: БЕЛЫЕ</span>
            </div>
            <div class="chronicle-card">
                <div class="bg-slate-800 p-3 text-sm font-bold uppercase text-slate-200">Хроника</div>
                <div class="narrative-scroll" id="narrative-box"><div id="chronicle-list" class="space-y-4"></div></div>
            </div>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
    <script>
        function selectScenario(key) {
            document.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('active', 'border-amber-500'));
            const card = document.getElementById('card-' + key);
            if(card) card.classList.add('active', 'border-amber-500');
            if(window.selectedScenarioKey !== undefined) window.selectedScenarioKey = key;
        }
        function exitToMenu() { location.reload(); }
    </script>
</body>
</html>
