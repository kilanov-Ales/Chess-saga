<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --gold-dim: #78350f;
            --red-exit: #ef4444;
        }
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
        }
        h1, h2, h3 { font-family: 'Cinzel', serif; }

        /* МЕНЮ (ИСПРАВЛЕНА ОБРЕЗКА) */
        #main-menu {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 2000;
            padding: 20px;
        }
        .scenario-selector {
            display: grid;
            grid-template-columns: repeat(3, 280px);
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .scenario-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .scenario-card.active { border-color: var(--gold); background: rgba(245, 158, 11, 0.15); }

        /* ИГРОВОЙ ИНТЕРФЕЙС - СДВИГ ВПРАВО */
        .app-container {
            display: none; 
            grid-template-columns: 780px 1fr; /* Больше места слева, чтобы сдвинуть всё вправо */
            width: 100vw; height: 100vh;
        }
        .app-visible { display: grid !important; }

        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Контент прижат к правому краю этой панели */
            justify-content: center;
            background: #0f172a;
            border-right: 1px solid #334155;
            position: relative;
            padding-right: 40px; /* Финальный отступ доски от центра */
        }

        /* УПРАВЛЕНИЕ СЛЕВА (НЕ НАЛАЗИТ) */
        .controls-group {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 1000;
        }
        .btn-exit-x { 
            width: 54px; height: 54px; 
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--red-exit); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--red-exit); cursor: pointer;
            font-size: 2.2rem; font-weight: bold;
            transition: 0.3s;
        }
        .btn-exit-x:hover { transform: rotate(90deg); background: var(--red-exit); color: white; }

        .volume-box {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            background: rgba(15, 23, 42, 0.9); padding: 12px 10px;
            border-radius: 25px; border: 1px solid var(--gold);
        }
        .volume-slider { -webkit-appearance: slider-vertical; width: 12px; height: 90px; cursor: pointer; }

        /* ТЕАТР */
        .theater-zone-mini { text-align: center; margin-bottom: 20px; width: 560px; }
        .visual-stage-mini img { width: 90px; height: 90px; margin: 0 auto; filter: drop-shadow(0 0 15px var(--gold)); }

        /* ДОСКА (560px) */
        .chess-board-outer { padding: 10px; background: #27272a; border-radius: 12px; box-shadow: 0 20px 50px #000; }
        .chess-board { 
            display: grid; 
            grid-template-columns: repeat(8, 70px); 
            grid-template-rows: repeat(8, 70px);
            width: 560px; height: 560px; 
        }
        .square { width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; position: relative; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 62px; height: 62px; z-index: 10; pointer-events: none; }
        
        .square.active-target::after {
            content: ''; position: absolute; inset: 4px;
            border: 3px solid var(--gold); border-radius: 4px;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

        /* ПРАВАЯ ПАНЕЛЬ */
        .right-panel { display: flex; flex-direction: column; padding: 1.5rem; gap: 1rem; background: var(--bg-dark); }
        .chronicle-card { background: #0f172a; border: 1px solid #334155; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .narrative-scroll { flex-grow: 1; overflow-y: auto; padding: 1rem; }

        /* МОБИЛКА */
        @media (max-width: 1024px) {
            .scenario-selector { grid-template-columns: 1fr; }
            .app-container { grid-template-columns: 1fr 1.2fr !important; }
            .left-panel { align-items: center !important; justify-content: flex-start !important; padding-right: 0 !important; padding-top: 10px !important; }
            
            .theater-zone-mini { width: 100% !important; height: 75px !important; margin-bottom: 5px !important; }
            #scene-desc { display: none !important; }
            .visual-stage-mini img { width: 45px !important; height: 45px !important; }

            .chess-board { 
                grid-template-columns: repeat(8, 35px) !important; 
                grid-template-rows: repeat(8, 35px) !important;
                width: 280px !important; height: 280px !important; 
            }
            .square { width: 35px !important; height: 35px !important; }
            .piece-img { width: 30px !important; height: 30px !important; }

            .controls-group { left: 10px; top: 10px; scale: 0.7; transform-origin: top left; }
            .volume-box { display: none; }
        }

        .flash-screen { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 5000; transition: opacity 0.4s; }
        .flash-active { opacity: 0.3; }
    </style>
</head>
<body onclick="resumeAudio()">
    <audio id="audio-bg" loop><source src="Music_Background.mp3" type="audio/mpeg"></audio>
    <div id="flash" class="flash-screen"></div>

    <div id="main-menu">
        <h1 class="text-6xl text-amber-500 font-bold mb-8">CHESS SAGA</h1>
        <div class="scenario-selector">
            <div class="scenario-card active" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold">✨ Свет Аргуса</h3>
                <p class="text-xs text-slate-500 mt-2">Миссия Экзодара</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold">🚩 Знамя Света</h3>
                <p class="text-xs text-slate-500 mt-2">Орден Юстициария</p>
            </div>
            <div class="scenario-card" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold">🌑 Судьба Тракслера</h3>
                <p class="text-xs text-slate-500 mt-2">Безумный гамбит</p>
            </div>
        </div>
        <button class="mt-12 px-16 py-4 border-2 border-amber-500 text-amber-500 rounded-full font-bold text-xl hover:bg-amber-500 hover:text-slate-900 transition-all" onclick="startGame()">В БОЙ</button>
    </div>

    <div class="app-container" id="main-app">
        <div class="left-panel">
            <div class="controls-group">
                <div class="btn-exit-x" onclick="exitToMenu()">×</div>
                <div class="volume-box">
                    <img src="Visualization/🔊.png" style="width:18px">
                    <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
                </div>
            </div>

            <div class="theater-zone-mini">
                <div id="visual-stage" class="visual-stage-mini"><img src="Visualization/🏰.png"></div>
                <h1 id="scene-title" class="text-xl text-amber-500 font-bold uppercase mt-2">Начало</h1>
                <p id="scene-desc" class="text-slate-400 italic text-sm mt-1">Ждем приказа...</p>
            </div>

            <div class="chess-board-outer">
                <div id="board" class="chess-board"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-[10px] text-sky-400 font-bold uppercase mb-2">Задачи</h3>
                    <ul id="goals-list" class="text-[11px] space-y-2 text-slate-300"></ul>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-red-900/30">
                    <h3 class="text-[10px] text-red-500 font-bold uppercase mb-2">Враг</h3>
                    <ul id="enemy-goals" class="text-[11px] space-y-2 text-slate-400"></ul>
                </div>
            </div>
            <div class="flex justify-between items-center text-xs font-mono text-amber-500 px-2 uppercase border-y border-slate-800 py-1">
                <span id="move-counter">ЭТАП: 1</span>
                <span id="player-turn">ХОД: БЕЛЫЕ</span>
            </div>
            <div class="chronicle-card">
                <div class="narrative-scroll" id="narrative-box">
                    <div id="chronicle-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
