<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --gold: #f59e0b;
            --red-bright: #ff0000;
        }
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* --- КНОПКА ВЫХОДА (АНИМАЦИЯ) --- */
        .btn-exit-x {
            position: absolute; top: 1.5rem; left: 1.5rem;
            width: 45px; height: 45px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold);
            cursor: pointer; z-index: 1000;
            font-size: 2rem;
            transition: transform 0.4s ease, border-color 0.3s, color 0.3s;
            background: rgba(15, 23, 42, 0.5);
        }
        .btn-exit-x:hover {
            transform: rotate(90deg);
            color: var(--red-bright);
            border-color: var(--red-bright);
        }
        .btn-exit-x:active {
            background-color: var(--red-bright) !important;
            color: white !important;
            transform: scale(0.9) rotate(90deg);
        }

        /* --- ЖЕСТКАЯ ВИЗУАЛИЗАЦИЯ (ЧТОБЫ НЕ ПРЫГАЛО) --- */
        .theater-zone-mini {
            height: 180px !important;
            min-height: 180px !important;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
            width: 100%;
            flex-shrink: 0;
        }

        /* --- ПОДСВЕТКА ПОЛЕЙ --- */
        .square.active-target {
            cursor: pointer !important;
            position: relative;
            z-index: 50;
        }
        .square.active-target::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 158, 11, 0.5);
            border: 3px solid var(--gold);
            animation: pulse-active 1s infinite alternate;
        }
        @keyframes pulse-active {
            from { opacity: 0.4; box-shadow: inset 0 0 0px var(--gold); }
            to { opacity: 0.8; box-shadow: inset 0 0 20px var(--gold); }
        }

        /* --- ДОСКА --- */
        .chess-board-outer { padding: 8px; background: #27272a; border-radius: 12px; }
        .chess-board { 
            display: grid; grid-template-columns: repeat(8, 1fr); 
            width: min(480px, 85vw, 55vh); height: min(480px, 85vw, 55vh); 
        }

        /* --- АЛЬБОМНЫЙ РЕЖИМ --- */
        @media (orientation: landscape) and (max-height: 600px) {
            .app-container { grid-template-columns: 1fr 1fr !important; }
            .theater-zone-mini { height: 120px !important; min-height: 120px !important; }
            .chess-board { width: 45vh; height: 45vh; }
            .visual-stage-mini img { height: 50px; }
        }

        /* Остальные стили */
        .app-container { display: none; grid-template-columns: 1.2fr 0.8fr; width: 100vw; height: 100vh; }
        .app-visible { display: grid !important; opacity: 1 !important; }
        .left-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; position: relative; }
        .right-panel { display: flex; flex-direction: column; padding: 1.5rem; gap: 1rem; background: var(--bg-dark); }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }
        .volume-box { background: rgba(15, 23, 42, 0.8); border: 1px solid var(--gold); border-radius: 30px; padding: 10px; }
        .vol-game { position: absolute; top: 100px; left: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .volume-slider { -webkit-appearance: slider-vertical; height: 100px; width: 10px; }
    </style>
</head>
<body onclick="resumeAudio()">
    <audio id="audio-bg" loop src="Music_Background.mp3"></audio>

    <div id="main-menu" class="fixed inset-0 flex flex-col items-center justify-center z-[2000] bg-[radial-gradient(circle_at_center,#1e293b_0%,#020617_100%)]">
        <h1 class="text-6xl text-amber-500 font-bold mb-8 font-[Cinzel]">CHESS SAGA</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 px-4">
            <div id="card-argus" class="scenario-card border border-slate-700 p-6 rounded-2xl cursor-pointer active" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold mb-2">✨ Свет Аргуса</h3>
                <p class="text-xs text-slate-400">История о самопожертвовании.</p>
            </div>
            <div id="card-standard" class="scenario-card border border-slate-700 p-6 rounded-2xl cursor-pointer" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold mb-2">🚩 Знамя Света</h3>
                <p class="text-xs text-slate-400">Орден против Клана.</p>
            </div>
            <div id="card-traxler" class="scenario-card border border-slate-700 p-6 rounded-2xl cursor-pointer" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold mb-2">🌑 Судьба Тракслера</h3>
                <p class="text-xs text-slate-400">Безумный гамбит.</p>
            </div>
        </div>
        <button class="px-16 py-4 bg-amber-500 text-slate-900 rounded-full font-bold uppercase tracking-widest hover:scale-105 transition-all" onclick="startGame()">Начать битву</button>
    </div>

    <div id="main-app" class="app-container">
        <div class="left-panel">
            <div class="btn-exit-x" onclick="exitToMenu()">×</div>
            
            <div class="vol-game volume-box">
                <img src="Visualization/🔊.png" class="w-5">
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
            </div>

            <div class="theater-zone-mini">
                <div id="visual-stage" class="h-20 flex items-center justify-center mb-2">
                    <img src="Visualization/城堡.png" class="h-full">
                </div>
                <h2 id="scene-title" class="text-amber-500 font-bold uppercase text-xl font-[Cinzel]">Затишье</h2>
                <p id="scene-desc" class="text-slate-400 italic text-sm px-6">Армии ждут приказа...</p>
            </div>

            <div class="chess-board-outer">
                <div id="board" class="chess-board"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="grid grid-cols-2 gap-4 h-32">
                <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-[10px] font-bold text-sky-400 mb-2 uppercase">Задачи</h3>
                    <ul id="goals-list" class="text-[11px] space-y-1 text-slate-300"></ul>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border border-red-900/30">
                    <h3 class="text-[10px] font-bold text-red-500 mb-2 uppercase">Враг</h3>
                    <ul id="enemy-goals" class="text-[11px] space-y-1 text-slate-400"></ul>
                </div>
            </div>
            <div class="flex-1 bg-slate-900/50 rounded-2xl border border-slate-800 flex flex-col overflow-hidden">
                <div class="bg-slate-800/50 p-2 text-center text-[10px] uppercase font-bold text-slate-500">Хроника</div>
                <div id="narrative-box" class="flex-1 overflow-y-auto p-4">
                    <div id="chronicle-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="flash" class="fixed inset-0 bg-white pointer-events-none opacity-0 z-[5000]"></div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
    <script>
        // Переопределяем функции для связи с новым UI
        const oldSelect = window.selectScenario;
        window.selectScenario = function(key) {
            document.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('active', 'border-amber-500'));
            const card = document.getElementById('card-' + key);
            card.classList.add('active', 'border-amber-500');
            selectedScenarioKey = key;
        }

        const oldExit = window.exitToMenu;
        window.exitToMenu = function() {
            location.reload();
        }
    </script>
</body>
</html>
