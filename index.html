<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Saga: Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #020617; --gold: #f59e0b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            font-family: 'Philosopher', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Полноэкранное меню */
        #main-menu {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: 5000; padding: 20px; text-align: center;
        }

        /* Фикс заголовка (чтобы не плыл) */
        .title-main {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 10vw, 5rem);
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 2rem;
            line-height: 1;
        }

        /* Контейнер приложения */
        #main-app {
            display: none; 
            width: 100vw; height: 100vh;
            grid-template-columns: 1.2fr 0.8fr;
            background: var(--bg-dark);
        }
        .app-visible { display: grid !important; }

        .left-panel {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0f172a; position: relative; padding: 10px;
        }

        /* Доска с гарантированным размером */
        .chess-board-outer { 
            padding: 5px; background: #27272a; border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #board { 
            display: grid; grid-template-columns: repeat(8, 1fr); 
            width: min(550px, 85vw, 60vh); 
            height: min(550px, 85vw, 60vh); 
            background: #8b5e3c; /* Запасной цвет, если клетки не прогрузятся */
        }
        .square { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
        .square.light { background-color: #d6b08d; }
        .square.dark { background-color: #8b5e3c; }
        .piece-img { width: 90%; height: 90%; object-fit: contain; }

        /* Ползунки и кнопки */
        #menu-vol { position: absolute; bottom: 20px; z-index: 100; display: flex; gap: 10px; align-items: center; }
        .vol-game { position: absolute; top: 15px; left: 15px; z-index: 100; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px; }
        .volume-slider { width: 80px; height: 5px; cursor: pointer; }

        .active-target { cursor: pointer; box-shadow: inset 0 0 15px var(--gold); background-color: rgba(245, 158, 11, 0.3) !important; }

        /* Адаптив под мобилки */
        @media (max-width: 900px) {
            #main-app { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; overflow-y: auto; }
            .left-panel { min-height: 100vh; }
            .right-panel { min-height: 100vh; }
        }

        /* Вспышка и тряска для твоего кода */
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 9999; }
        .flash-active { opacity: 0.3; }
        .shake-anim { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translate(0); } 25% { transform: translate(-5px); } 75% { transform: translate(5px); } }
    </style>
</head>
<body onclick="if(window.resumeAudio) resumeAudio()">
    <div id="flash"></div>
    <audio id="audio-bg" loop src="Music_Background.mp3"></audio>

    <div id="main-menu">
        <h1 class="title-main">CHESS SAGA</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-4xl mb-10">
            <div class="scenario-card p-4 border border-slate-700 rounded-xl cursor-pointer active:border-amber-500 bg-slate-900/50" onclick="selectScenario('argus')">
                <h3 class="text-amber-500 font-bold">Свет Аргуса</h3>
            </div>
            <div class="scenario-card p-4 border border-slate-700 rounded-xl cursor-pointer bg-slate-900/50" onclick="selectScenario('standard')">
                <h3 class="text-sky-400 font-bold">Знамя Света</h3>
            </div>
            <div class="scenario-card p-4 border border-slate-700 rounded-xl cursor-pointer bg-slate-900/50" onclick="selectScenario('traxler')">
                <h3 class="text-red-500 font-bold">Судьба Тракслера</h3>
            </div>
        </div>

        <button class="px-12 py-4 border-2 border-amber-500 text-amber-500 rounded-full font-bold uppercase tracking-widest active:bg-amber-500 active:text-white" onclick="startGame()">Начать битву</button>
        
        <div id="menu-vol">
            <span class="text-xs">МУЗЫКА:</span>
            <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
        </div>
    </div>

    <div id="main-app">
        <div class="left-panel">
            <div class="vol-game">
                <span class="text-[10px]">🔊</span>
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="updateVolume(this.value)">
            </div>

            <div class="text-center mb-4">
                <div id="visual-stage"></div>
                <h2 id="scene-title" class="text-amber-500 font-bold uppercase text-lg"></h2>
                <p id="scene-desc" class="text-slate-400 text-xs italic"></p>
            </div>

            <div class="chess-board-outer">
                <div id="board"></div>
            </div>
        </div>

        <div class="right-panel p-6 flex flex-col gap-4 bg-slate-950">
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-900 p-3 rounded-lg border border-slate-800">
                    <h3 class="text-[10px] text-sky-400 font-bold mb-1">ПЛАНЫ КОМПАНИИ</h3>
                    <ul id="goals-list" class="text-[10px] space-y-1"></ul>
                </div>
                <div class="bg-slate-900 p-3 rounded-lg border border-red-900/30">
                    <h3 class="text-[10px] text-red-500 font-bold mb-1">ЗАДУМЫ СОПЕРНИКА</h3>
                    <ul id="enemy-goals" class="text-[10px] space-y-1"></ul>
                </div>
            </div>

            <div class="flex justify-between text-[10px] font-bold text-amber-500 px-1">
                <span id="move-counter">ХОД: 1</span>
                <span id="player-turn">ОЧЕРЕДЬ: БЕЛЫЕ</span>
            </div>

            <div class="flex-1 bg-slate-900 border border-slate-800 rounded-xl overflow-hidden flex flex-col">
                <div class="bg-slate-800 p-2 text-[10px] text-center font-bold">ХРОНИКА СОБЫТИЙ</div>
                <div id="narrative-box" class="flex-1 overflow-y-auto p-4">
                    <div id="chronicle-list" class="space-y-3"></div>
                </div>
            </div>
            <button onclick="exitToMenu()" class="text-[10px] text-slate-500 hover:text-white uppercase">Выйти в меню</button>
        </div>
    </div>

    <script src="js/scenarios.js"></script>
    <script src="js/game.js"></script>
    <script>
        // Небольшой фикс, чтобы startGame точно сработал с твоим game.js
        const originalStartGame = window.startGame;
        window.startGame = function() {
            // Запуск оригинальной функции
            if (originalStartGame) originalStartGame();
            
            // Принудительно отрисовываем доску через мгновение, 
            // когда контейнер #main-app точно станет видимым
            setTimeout(() => {
                if (window.renderBoard) window.renderBoard();
                window.dispatchEvent(new Event('resize'));
            }, 100);
        };
    </script>
</body>
</html>
